services:
  # Frontend Service
  - type: web
    name: tech-news-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/build
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 18
    routes:
      - type: rewrite
        source: /api/*
        destination: https://tech-news-agent-ofj9.onrender.com/*
      - type: file
        source: /**
        destination: /index.html
