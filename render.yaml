services:
  # Backend API Service
  - type: web
    name: tech-news-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: TAVILY_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: PORT
        value: 8000
